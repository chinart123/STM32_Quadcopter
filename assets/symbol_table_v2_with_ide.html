
<style>
*{box-sizing:border-box;margin:0;padding:0}
.tabs{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap}
.tab{padding:5px 11px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-secondary);cursor:pointer;font-size:12px;font-weight:500}
.tab.on{background:var(--color-background-primary);color:var(--color-text-primary);border-color:var(--color-border-primary)}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:6px 7px;font-size:11px;font-weight:500;color:var(--color-text-secondary);border-bottom:1px solid var(--color-border-secondary);white-space:nowrap}
td{padding:5px 7px;border-bottom:0.5px solid var(--color-border-tertiary);vertical-align:top;line-height:1.5;font-size:12px}
tr:hover td{background:var(--color-background-secondary)}
code{font-family:var(--font-mono);font-size:11px;background:var(--color-background-secondary);padding:1px 4px;border-radius:3px}
code.new{background:#EAF3DE;color:#3B6D11}
code.del{background:#FCEBEB;color:#A32D2D;text-decoration:line-through}
.badge{display:inline-block;font-size:10px;font-weight:500;padding:1px 6px;border-radius:10px;white-space:nowrap;margin:1px}
.bk{background:#E6F1FB;color:#185FA5}
.ba{background:#FAEEDA;color:#854F0B}
.be{background:#EAF3DE;color:#3B6D11}
.bg{background:#F1EFE8;color:#5F5E5A}
.br{background:#FCEBEB;color:#A32D2D}
.bp{background:#EEEDFE;color:#534AB7}
.warn{font-size:10px;color:#A32D2D}
.ok{font-size:10px;color:#3B6D11}
</style>
<div class="tabs" id="tabs">
  <div class="tab on" onclick="show('all',this)">Tất cả</div>
  <div class="tab" onclick="show('imu',this)">IMU</div>
  <div class="tab" onclick="show('motor',this)">Motor</div>
  <div class="tab" onclick="show('pid',this)">PID</div>
  <div class="tab" onclick="show('btn',this)">Button</div>
  <div class="tab" onclick="show('board',this)">Board</div>
  <div class="tab" onclick="show('tel',this)">Telemetry</div>
  <div class="tab" onclick="show('time',this)">Time</div>
  <div class="tab" onclick="show('conflict',this)">⚠️ Xung đột</div>
  <div class="tab" onclick="show('resolved',this)">✅ Đã quyết định</div>
</div>

</table>

const imap={keil:'<span class="badge bk">Keil</span>',idf:'<span class="badge be">ESP-IDF</span>',ard:'<span class="badge ba">Arduino</span>'};
const chipBadge={stm:'<span class="badge bk">STM32</span>',esp:'<span class="badge ba">ESP32</span>',both:'<span class="badge bg">Cả hai</span>'};
const typeBadge={func:'<span class="badge bg">hàm</span>',var:'<span class="badge bp">biến</span>',struct:'<span class="badge bk">struct</span>',enum:'<span class="badge bg">enum</span>'};

let cur='all';
function show(tab,el){
  cur=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  render();
}
function render(){
  const rows=D.filter(d=>{
    if(cur==='all') return true;
    if(cur==='conflict') return d.x;
    if(cur==='resolved') return d.r&&d.r.startsWith('→');
    return d.m===cur;
  });
  const tbody=document.getElementById('tbody');
  let html='';
  rows.forEach(d=>{
    const ideHtml=(d.ide||[]).map(i=>imap[i]||'').join(' ');
    const rHtml=d.r.startsWith('✅')?`<code class="ok" style="background:transparent;font-size:10px">${d.r}</code>`
      :d.r.startsWith('→')?`<code class="new" style="font-size:10px">${d.r}</code>`
      :`<code style="font-size:10px">${d.r}</code>`;
    const nameHtml=d.x?`<code class="del">${d.n}</code>`:`<code>${d.n}</code>`;
    html+=`<tr>
      <td>${nameHtml}</td>
      <td>${rHtml}</td>
      <td>${chipBadge[d.c]}</td>
      <td>${ideHtml}</td>
      <td style="font-size:11px;color:var(--color-text-secondary)">${d.m}</td>
      <td>${typeBadge[d.t]||d.t}</td>
      <td style="color:var(--color-text-secondary)">${d.note}</td>
    </tr>`;
  });
  tbody.innerHTML=html||'<tr><td colspan="7" style="text-align:center;color:var(--color-text-secondary);padding:20px">Không có dữ liệu</td></tr>';
}
render();
</script>
