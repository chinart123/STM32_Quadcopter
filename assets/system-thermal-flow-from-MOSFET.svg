<svg width="650" height="580" viewBox="0 0 650 580" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#333" />
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#d32f2f" />
    </marker>
  </defs>
  
  <rect width="650" height="580" fill="#f8f9fa" />
  <text x="325" y="30" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="18" fill="#333">CAUSAL THERMAL FLOW: AO3400A &amp; MPU6050</text>

  <rect x="50" y="60" width="150" height="60" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
  <text x="125" y="85" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="14">PWM Frequency</text>
  <text x="125" y="105" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555">Control Input</text>

  <rect x="250" y="60" width="150" height="60" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
  <text x="325" y="85" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="14">Gate Voltage</text>
  <text x="325" y="105" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555">Hardware Constraint</text>

  <rect x="450" y="60" width="150" height="60" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
  <text x="525" y="85" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="14">Duty Cycle</text>
  <text x="525" y="105" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555">Load Demand</text>

  <line x1="125" y1="120" x2="125" y2="180" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="325" y1="120" x2="325" y2="180" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="525" y1="120" x2="525" y2="180" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="50" y="180" width="150" height="60" rx="5" fill="#fff9c4" stroke="#fbc02d" stroke-width="2"/>
  <text x="125" y="205" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="14">Switching Loss</text>
  <text x="125" y="225" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555">P_sw = f * Crss</text>

  <rect x="250" y="180" width="150" height="60" rx="5" fill="#fff9c4" stroke="#fbc02d" stroke-width="2"/>
  <text x="325" y="205" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="14">RDS(on) Resistance</text>
  <text x="325" y="225" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555">Intrinsic Barrier</text>

  <rect x="450" y="180" width="150" height="60" rx="5" fill="#fff9c4" stroke="#fbc02d" stroke-width="2"/>
  <text x="525" y="205" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="14">Conduction Loss</text>
  <text x="525" y="225" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555">P_cond = I² * RDS</text>

  <path d="M 400 210 L 440 210" fill="none" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <line x1="125" y1="240" x2="310" y2="300" stroke="#d32f2f" stroke-width="2" marker-end="url(#arrow-red)"/>
  <line x1="525" y1="240" x2="340" y2="300" stroke="#d32f2f" stroke-width="2" marker-end="url(#arrow-red)"/>

  <rect x="250" y="300" width="150" height="60" rx="5" fill="#ffccbc" stroke="#d32f2f" stroke-width="2"/>
  <text x="325" y="325" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="14">Total Power Loss</text>
  <text x="325" y="345" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#d32f2f">Generates Junction Heat</text>

  <path d="M 400 330 C 470 330, 470 160, 360 180" fill="none" stroke="#d32f2f" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow-red)"/>
  <text x="460" y="260" font-family="sans-serif" font-size="12" fill="#d32f2f" font-weight="bold">Thermal Runaway</text>

  <line x1="325" y1="360" x2="325" y2="420" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="250" y="420" width="150" height="60" rx="5" fill="#dcedc8" stroke="#689f38" stroke-width="2"/>
  <text x="325" y="445" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="14">PCB Distance &amp; Wind</text>
  <text x="325" y="465" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555">Thermal Filter</text>

  <line x1="325" y1="480" x2="325" y2="520" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="250" y="520" width="150" height="40" rx="5" fill="#ffcdd2" stroke="#d32f2f" stroke-width="2"/>
  <text x="325" y="545" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="14">MPU6050 Sensor Drift</text>

</svg>
