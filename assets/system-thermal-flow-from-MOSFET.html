<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mô phỏng Truyền Nhiệt & Live Watch MPU6050</title>
    <style>
        body { font-family: 'Consolas', 'Courier New', monospace; background: #1e1e1e; color: #d4d4d4; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        h2 { color: #569cd6; text-align: center; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        /* Layout */
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .panel { background: #252526; padding: 15px; border: 1px solid #333; border-radius: 5px; }
        .panel-title { color: #ce9178; font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #444; padding-bottom: 5px; }
        
        /* Controls */
        label { display: block; margin-bottom: 5px; font-size: 0.9em; color: #9cdafe; }
        input[type="range"] { width: 100%; margin-bottom: 15px; }
        .val-text { color: #b5cea8; font-weight: bold; float: right; }

        /* MÔ PHỎNG PCB TRỰC QUAN */
        .pcb-board { 
            position: relative; background: #0f2c1e; height: 180px; 
            border: 2px solid #333; border-radius: 5px; overflow: hidden; margin-bottom: 20px;
            background-image: linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .component { position: absolute; top: 50%; transform: translateY(-50%); padding: 10px; border-radius: 3px; text-align: center; font-weight: bold; font-family: 'Segoe UI'; z-index: 10; color: white; }
        .mosfet { left: 40px; background: #333; border: 1px solid #555; width: 80px; }
        .sensor { background: #4caf50; border: 1px solid #2e7d32; width: 90px; transition: left 0.1s; }
        
        /* Hiệu ứng nhiệt */
        .heat-glow { position: absolute; top: 50%; left: 80px; transform: translate(-50%, -50%); width: 0px; height: 0px; border-radius: 50%; background: radial-gradient(circle, rgba(255,50,0,0.5) 0%, rgba(255,100,0,0.2) 60%, rgba(255,255,255,0) 100%); transition: width 0.3s, height 0.3s; z-index: 1; pointer-events: none; }

        /* LIVE WATCH TABLE */
        table { width: 100%; border-collapse: collapse; background: #1e1e1e; font-size: 0.9em; }
        th, td { border: 1px solid #444; padding: 8px; text-align: left; }
        th { background: #2d2d30; color: #dcdcaa; }
        .type-col { color: #569cd6; }
        .val-col { color: #b5cea8; text-align: right; font-family: monospace; }
        .alert-row { background: rgba(211, 47, 47, 0.2); }
    </style>
</head>
<body>

<div class="container">
    <h2>[STM32CubeIDE] Live Expressions & Thermal Sim</h2>

    <div class="pcb-board">
        <div class="heat-glow" id="heat-glow"></div>
        <div class="component mosfet">AO3400A<br><span id="lbl-tmosfet" style="color:#ff8a65;">30.0°C</span></div>
        <div class="component sensor" id="sensor-block">MPU6050<br><span id="lbl-tsensor">30.0°C</span></div>
    </div>

    <div class="dashboard">
        <div class="panel">
            <div class="panel-title">Hardware Parameters</div>
            
            <label>PWM Frequency <span class="val-text" id="val-freq">16000 Hz</span></label>
            <input type="range" id="freq-slider" min="0" max="2" step="1" value="2">
            
            <label>Base RDS(on) <span class="val-text" id="val-rds">25 mΩ</span></label>
            <input type="range" id="rds-slider" min="18" max="60" step="0.5" value="25">
            
            <label>PCB Distance (MOSFET to MPU) <span class="val-text" id="val-dist">15 mm</span></label>
            <input type="range" id="dist-slider" min="2" max="30" step="1" value="15">
        </div>

        <div class="panel" style="padding: 0; overflow: hidden;">
            <table id="live-watch">
                <thead>
                    <tr><th>Expression</th><th>Type</th><th>Value</th></tr>
                </thead>
                <tbody>
                    <tr><td>Drone_IMU.Ax</td><td class="type-col">float</td><td class="val-col" id="w-ax">0.00</td></tr>
                    <tr><td>Drone_IMU.Ay</td><td class="type-col">float</td><td class="val-col" id="w-ay">0.00</td></tr>
                    <tr><td>Drone_IMU.Az</td><td class="type-col">float</td><td class="val-col" id="w-az">1.00</td></tr>
                    <tr><td>Drone_IMU.Gx</td><td class="type-col">float</td><td class="val-col" id="w-gx">0.00</td></tr>
                    <tr><td>Drone_IMU.Gy</td><td class="type-col">float</td><td class="val-col" id="w-gy">0.00</td></tr>
                    <tr id="row-roll"><td>Drone_IMU.Roll</td><td class="type-col">float</td><td class="val-col" id="w-roll" style="font-weight: bold;">0.00</td></tr>
                    <tr id="row-pitch"><td>Drone_IMU.Pitch</td><td class="type-col">float</td><td class="val-col" id="w-pitch" style="font-weight: bold;">0.00</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const freqs = [500, 4000, 16000];
    const inputs = ['freq', 'rds', 'dist'].map(id => document.getElementById(`${id}-slider`));
    let tSensorGlobal = 30.0;
    let timeTick = 0;

    function calcPhysics() {
        const freq = freqs[inputs[0].value];
        const rdsBase = parseFloat(inputs[1].value);
        const dist_mm = parseFloat(inputs[2].value);

        document.getElementById('val-freq').innerText = freq + " Hz";
        document.getElementById('val-rds').innerText = rdsBase + " mΩ";
        document.getElementById('val-dist').innerText = dist_mm + " mm";

        // Vật lý
        const pSw = 46250 * freq * 50e-12;
        let pCond = 4.0 * (rdsBase / 1000) * 0.8; 
        
        let tMosfet = 30 + ((pSw + pCond) * 100); 
        
        // Lùi nhiệt (Đơn giản hóa)
        if (tMosfet > 60) {
            pCond = pCond * (1 + ((tMosfet - 60) * 0.015));
            tMosfet = 30 + ((pSw + pCond) * 100);
        }

        const tSensor = 30 + ((tMosfet - 30) * Math.exp(-dist_mm / 8)); 
        tSensorGlobal = tSensor; // Lưu cho vòng lặp Live Watch

        // Update CSS Trực quan
        document.getElementById('lbl-tmosfet').innerText = tMosfet.toFixed(1) + "°C";
        document.getElementById('lbl-tsensor').innerText = tSensor.toFixed(1) + "°C";

        const sensorLeft = 140 + (dist_mm * 15);
        document.getElementById('sensor-block').style.left = sensorLeft + "px";

        const glow = document.getElementById('heat-glow');
        glow.style.width = Math.max(0, (tMosfet - 30) * 7) + "px";
        glow.style.height = Math.max(0, (tMosfet - 30) * 7) + "px";

        const sensor = document.getElementById('sensor-block');
        if (tSensor > 45) { sensor.style.background = '#d32f2f'; }
        else if (tSensor > 35) { sensor.style.background = '#fbc02d'; }
        else { sensor.style.background = '#4caf50'; }
    }

    // Vòng lặp cập nhật Live Watch (Mô phỏng dữ liệu I2C)
    setInterval(() => {
        timeTick += 0.1;
        
        // Nhiễu tự nhiên cơ bản (Luôn có)
        let baseNoise = (Math.random() - 0.5) * 0.05;
        
        // Sai số do Nhiệt (Thermal Drift) - Kích hoạt khi MPU6050 > 35 độ
        let thermalDrift = 0;
        if (tSensorGlobal > 35) {
            const severity = (tSensorGlobal - 35) * 0.15;
            thermalDrift = Math.sin(timeTick) * severity + (Math.random() * severity);
            document.getElementById('row-roll').className = "alert-row";
            document.getElementById('row-pitch').className = "alert-row";
        } else {
            document.getElementById('row-roll').className = "";
            document.getElementById('row-pitch').className = "";
        }

        // Tạo dữ liệu cho bảng
        const ax = baseNoise;
        const ay = baseNoise;
        const az = 1.0 + baseNoise;
        const gx = baseNoise + thermalDrift;
        const gy = baseNoise - thermalDrift;
        
        const roll = gx * 2.5; // Giả lập bộ lọc tích phân
        const pitch = gy * 2.5;

        // In ra màn hình
        document.getElementById('w-ax').innerText = ax.toFixed(3);
        document.getElementById('w-ay').innerText = ay.toFixed(3);
        document.getElementById('w-az').innerText = az.toFixed(3);
        document.getElementById('w-gx').innerText = gx.toFixed(2);
        document.getElementById('w-gy').innerText = gy.toFixed(2);
        document.getElementById('w-roll').innerText = roll.toFixed(2);
        document.getElementById('w-pitch').innerText = pitch.toFixed(2);
        
    }, 100); // Cập nhật mỗi 100ms

    inputs.forEach(slider => slider.addEventListener('input', calcPhysics));
    calcPhysics();
</script>

</body>
</html>
